ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
}

jwt {
    secret = "kmp-terminator-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "kmp-terminator"
    audience = "kmp-terminator-api"
    realm = "kmp-terminator"
}

database {
    url = "jdbc:postgresql://localhost:5432/kmp_terminator"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
}
